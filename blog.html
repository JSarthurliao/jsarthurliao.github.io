<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="elements/post.css">
  <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism.css" rel="stylesheet" />
  <title></title>
</head>

<body>
  <div id="blog"></div>
  <pre><code class="language-js">console.log("Hello, world!");
  </code></pre>
  <div id="footer"></div>
</body>

<style>
  .token.keyword { color: #e6caac; }
  .token.string { color: #3C4897; }
  .token.comment { color: #999999; font-style: italic; }
</style>

<script src="core/post.js"></script>
<script>
  fetch("blogs/markdown-illustration.md")
  .then(response => response.text())
  .then(markdown => {
    const html = translate(markdown);
    document.getElementById("blog").innerHTML = html;
  });
</script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    fetch("footer.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      })
      .catch(error => console.error('Error loading footer:', error));
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
</html>
